name: riscv64-gcc13-spike

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/gcc13-riscv64-spike.yml"
      - "toolchain/patches/gcc13/**"
  workflow_dispatch:
    inputs:
      gcc_version:
        description: "Upstream GCC version to overlay (example: 13.2.0)"
        required: false
        default: "13.2.0"
        type: string

permissions:
  contents: read

concurrency:
  group: riscv64-gcc13-spike-${{ github.ref }}
  cancel-in-progress: false

jobs:
  spike:
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    env:
      DEBIAN_FRONTEND: noninteractive
      OBJDIR: obj.gcc13
      MACHINE: evbriscv64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reclaim runner disk space
        shell: bash
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup"
          df -h

          sudo swapoff -a || true
          sudo rm -f /swapfile || true

          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL || true

          if command -v docker >/dev/null 2>&1; then
            sudo docker system prune -af || true
          fi

          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

          echo "Disk usage after cleanup"
          df -h

      - name: Install host dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bc \
            bison \
            build-essential \
            byacc \
            ca-certificates \
            curl \
            e2fsprogs \
            file \
            flex \
            gawk \
            gperf \
            libelf-dev \
            libncurses-dev \
            libssl-dev \
            m4 \
            make \
            pkg-config \
            python3 \
            python3-pip \
            rsync \
            texinfo

      - name: Overlay GCC dist with upstream GCC 13
        shell: bash
        run: |
          set -euo pipefail

          gcc_ver='${{ inputs.gcc_version }}'
          if [[ -z "${gcc_ver}" ]]; then
            gcc_ver="13.2.0"
          fi

          case "${gcc_ver}" in
            13.*) ;;
            *)
              echo "This spike workflow currently supports GCC 13.x only. got=${gcc_ver}" >&2
              exit 1
              ;;
          esac

          workdir="$(mktemp -d)"
          trap 'rm -rf "${workdir}"' EXIT

          src_url="https://ftp.gnu.org/gnu/gcc/gcc-${gcc_ver}/gcc-${gcc_ver}.tar.xz"
          echo "Fetching ${src_url}"
          curl -L --fail --retry 3 --retry-delay 2 -o "${workdir}/gcc.tar.xz" "${src_url}"

          echo "Extracting gcc-${gcc_ver}"
          tar -C "${workdir}" -xf "${workdir}/gcc.tar.xz"
          if [[ ! -d "${workdir}/gcc-${gcc_ver}" ]]; then
            echo "Missing extracted source dir: ${workdir}/gcc-${gcc_ver}" >&2
            exit 1
          fi

          rm -rf external/gpl3/gcc/dist
          mv "${workdir}/gcc-${gcc_ver}" external/gpl3/gcc/dist

          patch_dir="toolchain/patches/gcc13"
          shopt -s nullglob
          patches=("${patch_dir}"/*.patch)
          if (( ${#patches[@]} > 0 )); then
            for p in "${patches[@]}"; do
              echo "Applying ${p}"
              patch -d external/gpl3/gcc/dist -p1 < "${p}"
            done
          else
            echo "No GCC13 patch files found in ${patch_dir}."
          fi

          # Visibility check only: without MINIX target hooks in config.gcc,
          # configure will fail with unsupported target.
          if ! grep -Eq 'minix|.*-\*-minix' external/gpl3/gcc/dist/gcc/config.gcc; then
            echo "Warning: no MINIX target entry found in GCC13 config.gcc; build is expected to fail until patchset is added." >&2
          fi

      - name: Build tools (gcc13 spike)
        shell: bash
        run: |
          set -euo pipefail
          HARDENING_OFF="-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0 -fno-stack-protector"

          # GCC 13 configure requires host C++11 support; the legacy tools/gcc
          # wrapper pins gnu++98 for GCC 4.8 and must be relaxed for this spike.
          sed -i 's/-std=gnu++98/-std=gnu++11/g' tools/gcc/Makefile
          # GCC13 upstream does not recognize riscv64-elf32-minix yet.
          # For spike progress, force the tools/gcc wrapper target triple to a
          # supported baseline and collect the next blocker.
          if ! grep -q '^MACHINE_GNU_PLATFORM=.*riscv64-unknown-elf' tools/gcc/Makefile; then
            sed -i '/^\.include <bsd\.own\.mk>$/a MACHINE_GNU_PLATFORM=\triscv64-unknown-elf' \
              tools/gcc/Makefile
          fi
          if ! grep -q -- '-std=gnu++11' tools/gcc/Makefile; then
            echo "Failed to switch tools/gcc/Makefile host C++ standard to gnu++11" >&2
            exit 1
          fi
          if ! grep -q '^MACHINE_GNU_PLATFORM=.*riscv64-unknown-elf' tools/gcc/Makefile; then
            echo "Failed to override MACHINE_GNU_PLATFORM in tools/gcc/Makefile" >&2
            exit 1
          fi
          # GCC13 spike still builds host tools under the legacy
          # riscv64-elf32-minix prefix. Start a watcher that waits for tooldir
          # creation and then injects riscv64-unknown-elf-* compatibility links
          # without pre-creating incomplete tooldir trees.
          (
            set +e
            shopt -s nullglob
            for _ in $(seq 1 180); do
              for toolbindir in ${OBJDIR}/tooldir.*/bin; do
                [[ -d "${toolbindir}" ]] || continue
                for tool in install ar as ld nm objcopy objdump ranlib readelf size strings strip addr2line c++ c++filt cc cpp g++ gcc gcov gprof elfedit; do
                  ln -sf "riscv64-elf32-minix-${tool}" "${toolbindir}/riscv64-unknown-elf-${tool}"
                done
                exit 0
              done
              sleep 2
            done
            exit 0
          ) &
          linkwatch_pid=$!
          grep -nE '^MACHINE_GNU_PLATFORM|gnu\\+\\+1[1-7]|--target=\\$\\{MACHINE_GNU_PLATFORM\\}' \
            tools/gcc/Makefile | head -n 20 || true

          if ! (MKPCI=no HOST_CFLAGS="-O -fcommon ${HARDENING_OFF}" HOST_CXXFLAGS="-O ${HARDENING_OFF}" HAVE_GOLD=no HAVE_LLVM=no MKLLVM=no \
            ./build.sh -U -m "${MACHINE}" -O "${OBJDIR}" \
              -V MACHINE_GNU_PLATFORM=riscv64-unknown-elf \
              -V AVAILABLE_COMPILER=gcc \
              -V ACTIVE_CC=gcc \
              -V ACTIVE_CPP=gcc \
              -V ACTIVE_CXX=gcc \
              -V ACTIVE_OBJC=gcc \
              -V MKGCC=yes \
              -V MKGCCCMDS=yes \
              -V MKCXX=yes \
              -V MKLIBSTDCXX=yes \
              tools) 2>&1 | tee /tmp/gcc13-spike-tools.log; then
            wait "${linkwatch_pid}" || true
            echo "gcc13 spike build failed. Inspect /tmp/gcc13-spike-tools.log" >&2
            exit 1
          fi
          wait "${linkwatch_pid}" || true
          shopt -s nullglob
          for toolbindir in ${OBJDIR}/tooldir.*/bin; do
            [[ -d "${toolbindir}" ]] || continue
            for src in "${toolbindir}"/riscv64-elf32-minix-*; do
              base="${src##*/riscv64-elf32-minix-}"
              ln -sf "$(basename "${src}")" "${toolbindir}/riscv64-unknown-elf-${base}"
            done
          done
          shopt -u nullglob

      - name: Upload gcc13 spike log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: riscv64-gcc13-spike-log-${{ github.run_id }}
          path: /tmp/gcc13-spike-tools.log
