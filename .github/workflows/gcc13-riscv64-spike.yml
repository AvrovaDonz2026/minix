name: riscv64-gcc13-spike

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/gcc13-riscv64-spike.yml"
      - "toolchain/patches/gcc13/**"
      - "toolchain/patches/gcc13/workspace/**"
      - "toolchain/patches/gcc13/scripts/**"
      - "external/gpl3/gcc/lib/**"
      - "lib/libc/arch/riscv/**"
      - "lib/libc/softfloat/**"
      - "sys/sys/ansi.h"
      - "sys/sys/stdarg.h"
      - "include/stddef.h"
  workflow_dispatch:
    inputs:
      gcc_version:
        description: "Upstream GCC version to overlay (example: 13.2.0)"
        required: false
        default: "13.2.0"
        type: string
      target_mode:
        description: "Target mode: native=minix triple, shim=unknown-elf override"
        required: false
        default: "native"
        type: choice
        options:
          - native
          - shim
      build_scope:
        description: "Build scope: tools only or full distribution + bootstrap smoke"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - tools

permissions:
  contents: read

concurrency:
  group: riscv64-gcc13-spike-${{ github.ref }}
  cancel-in-progress: false

jobs:
  spike:
    runs-on: ubuntu-24.04
    timeout-minutes: 480
    env:
      DEBIAN_FRONTEND: noninteractive
      OBJDIR: obj.gcc13
      MACHINE: evbriscv64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reclaim runner disk space
        shell: bash
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup"
          df -h

          sudo swapoff -a || true
          sudo rm -f /swapfile || true

          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL || true

          if command -v docker >/dev/null 2>&1; then
            sudo docker system prune -af || true
          fi

          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

          echo "Disk usage after cleanup"
          df -h

      - name: Install host dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bc \
            bison \
            build-essential \
            byacc \
            ca-certificates \
            curl \
            e2fsprogs \
            file \
            flex \
            gawk \
            gperf \
            libelf-dev \
            libncurses-dev \
            libssl-dev \
            m4 \
            make \
            pkg-config \
            python3 \
            python3-pip \
            rsync \
            texinfo

      - name: Overlay GCC dist with upstream GCC 13
        shell: bash
        run: |
          set -euo pipefail

          gcc_ver='${{ inputs.gcc_version }}'
          if [[ -z "${gcc_ver}" ]]; then
            gcc_ver="13.2.0"
          fi

          case "${gcc_ver}" in
            13.*) ;;
            *)
              echo "This spike workflow currently supports GCC 13.x only. got=${gcc_ver}" >&2
              exit 1
              ;;
          esac

          workdir="$(mktemp -d)"
          trap 'rm -rf "${workdir}"' EXIT

          src_urls=(
            "https://ftp.gnu.org/gnu/gcc/gcc-${gcc_ver}/gcc-${gcc_ver}.tar.xz"
            "https://ftpmirror.gnu.org/gcc/gcc-${gcc_ver}/gcc-${gcc_ver}.tar.xz"
            "https://mirrors.kernel.org/gnu/gcc/gcc-${gcc_ver}/gcc-${gcc_ver}.tar.xz"
          )
          fetched=0
          for src_url in "${src_urls[@]}"; do
            echo "Fetching ${src_url}"
            if curl -L --fail --retry 5 --retry-delay 3 --retry-all-errors \
              --connect-timeout 20 --max-time 900 \
              -o "${workdir}/gcc.tar.xz" "${src_url}"; then
              fetched=1
              break
            fi
            echo "Fetch failed from ${src_url}, trying next mirror..."
          done
          if [[ "${fetched}" != "1" ]]; then
            echo "Failed to download gcc-${gcc_ver}.tar.xz from all mirrors" >&2
            exit 1
          fi

          echo "Extracting gcc-${gcc_ver}"
          tar -C "${workdir}" -xf "${workdir}/gcc.tar.xz"
          if [[ ! -d "${workdir}/gcc-${gcc_ver}" ]]; then
            echo "Missing extracted source dir: ${workdir}/gcc-${gcc_ver}" >&2
            exit 1
          fi

          rm -rf external/gpl3/gcc/dist
          mv "${workdir}/gcc-${gcc_ver}" external/gpl3/gcc/dist

          patch_dir="toolchain/patches/gcc13/gcc-dist"
          shopt -s nullglob
          patches=("${patch_dir}"/*.patch)
          if (( ${#patches[@]} > 0 )); then
            for p in "${patches[@]}"; do
              echo "Applying ${p}"
              patch -d external/gpl3/gcc/dist -p1 < "${p}"
            done
          else
            echo "No GCC13 dist patch files found in ${patch_dir}."
          fi

          # Visibility check only: without MINIX target hooks in config.gcc,
          # configure will fail with unsupported target.
          if ! grep -Eq 'minix|.*-\*-minix' external/gpl3/gcc/dist/gcc/config.gcc; then
            echo "Warning: no MINIX target entry found in GCC13 config.gcc; build is expected to fail until patchset is added." >&2
          fi

      - name: Build tools (gcc13 spike)
        shell: bash
        run: |
          set -euo pipefail
          HARDENING_OFF="-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0 -fno-stack-protector"
          target_mode='${{ inputs.target_mode }}'
          build_scope='${{ inputs.build_scope }}'
          if [[ -z "${target_mode}" ]]; then
            target_mode="native"
          fi
          if [[ -z "${build_scope}" ]]; then
            build_scope="full"
          fi
          case "${target_mode}" in
            native|shim) ;;
            *)
              echo "unsupported target_mode=${target_mode}" >&2
              exit 1
              ;;
          esac
          case "${build_scope}" in
            full|tools) ;;
            *)
              echo "unsupported build_scope=${build_scope}" >&2
              exit 1
              ;;
          esac

          # Apply small workspace-scoped compatibility patches in lexical order.
          workspace_patch_dir="toolchain/patches/gcc13/workspace"
          bash toolchain/patches/gcc13/scripts/apply-workspace-patches.sh \
            "${workspace_patch_dir}" "${target_mode}"
          bash toolchain/patches/gcc13/scripts/ensure-riscv-config-links.sh

          if ! grep -q -- '-std=gnu++11' tools/gcc/Makefile; then
            echo "Failed to switch tools/gcc/Makefile host C++ standard to gnu++11" >&2
            exit 1
          fi
          if [[ "${target_mode}" == "shim" ]]; then
            if ! grep -q '^MACHINE_GNU_PLATFORM=.*riscv64-unknown-elf' tools/gcc/Makefile; then
              echo "Failed to override MACHINE_GNU_PLATFORM in tools/gcc/Makefile (shim mode)" >&2
              exit 1
            fi
          else
            if grep -q '^MACHINE_GNU_PLATFORM=.*riscv64-unknown-elf' tools/gcc/Makefile; then
              echo "Unexpected shim MACHINE_GNU_PLATFORM override in native mode" >&2
              exit 1
            fi
          fi

          target_override_args=()
          linkwatch_pid=""
          if [[ "${target_mode}" == "shim" ]]; then
            # Shim mode still builds host tools under riscv64-elf32-minix
            # while gcc sub-build expects riscv64-unknown-elf tools.
            bash toolchain/patches/gcc13/scripts/spawn-compat-linkwatch.sh "${OBJDIR}" &
            linkwatch_pid=$!
            target_override_args+=( -V MACHINE_GNU_PLATFORM=riscv64-unknown-elf )
          fi
          grep -nE '^MACHINE_GNU_PLATFORM|gnu\\+\\+1[1-7]|--target=\\$\\{MACHINE_GNU_PLATFORM\\}' \
            tools/gcc/Makefile | head -n 20 || true

          # GCC13 fixincludes expects a sysroot include tree in OBJDIR destdir.
          bash toolchain/patches/gcc13/scripts/seed-sysroot-headers.sh \
            "${OBJDIR}" "${MACHINE}" "obj.intrgcc"

          if ! (MKPCI=no HOST_CFLAGS="-O -fcommon ${HARDENING_OFF}" HOST_CXXFLAGS="-O ${HARDENING_OFF}" HAVE_GOLD=no HAVE_LLVM=no MKLLVM=no \
            ./build.sh -U -m "${MACHINE}" -O "${OBJDIR}" \
              "${target_override_args[@]}" \
              -V AVAILABLE_COMPILER=gcc \
              -V ACTIVE_CC=gcc \
              -V ACTIVE_CPP=gcc \
              -V ACTIVE_CXX=gcc \
              -V ACTIVE_OBJC=gcc \
              -V MKGCC=yes \
              -V MKGCCCMDS=yes \
              -V MKCXX=yes \
              -V MKLIBSTDCXX=yes \
              -V GCC13_SPIKE=yes \
              tools) 2>&1 | tee /tmp/gcc13-spike-tools.log; then
            if [[ -n "${linkwatch_pid}" ]]; then
              wait "${linkwatch_pid}" || true
            fi
            echo "gcc13 spike build failed. Inspect /tmp/gcc13-spike-tools.log" >&2
            exit 1
          fi
          if [[ -n "${linkwatch_pid}" ]]; then
            wait "${linkwatch_pid}" || true
            bash toolchain/patches/gcc13/scripts/refresh-compat-links.sh "${OBJDIR}"
          fi

          echo "target_mode=${target_mode}" >>"${GITHUB_ENV}"
          echo "build_scope=${build_scope}" >>"${GITHUB_ENV}"

      - name: Build distribution (gcc13 spike)
        shell: bash
        run: |
          set -euo pipefail
          HARDENING_OFF="-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0 -fno-stack-protector"
          target_mode="${target_mode:-native}"
          build_scope="${build_scope:-full}"
          if [[ "${build_scope}" != "full" ]]; then
            echo "Skipping distribution build for build_scope=${build_scope}"
            exit 0
          fi

          target_override_args=()
          if [[ "${target_mode}" == "shim" ]]; then
            target_override_args+=( -V MACHINE_GNU_PLATFORM=riscv64-unknown-elf )
          fi

          tooldir="$(find "${PWD}/${OBJDIR}" -maxdepth 1 -type d -name 'tooldir.*' -print -quit)"
          if [[ -z "${tooldir}" ]]; then
            echo "Missing tooldir under ${PWD}/${OBJDIR}" >&2
            exit 1
          fi

          if [[ "${target_mode}" == "shim" ]]; then
            triplet="riscv64-unknown-elf"
          else
            triplet="riscv64-elf32-minix"
          fi

          bash toolchain/patches/gcc13/scripts/ensure-riscv-config-links.sh
          link_watch_pid=""
          bash toolchain/patches/gcc13/scripts/watch-riscv-config-links.sh &
          link_watch_pid=$!

          as_watch_targets=("${tooldir}/bin/${triplet}-as")
          if [[ -d "${tooldir}/${triplet}/bin" ]]; then
            as_watch_targets+=("${tooldir}/${triplet}/bin/as")
          fi

          as_watch_pids=()
          for as_target in "${as_watch_targets[@]}"; do
            bash toolchain/patches/gcc13/scripts/watch-legacy-riscv-as-wrap.sh \
              "${as_target}" &
            as_watch_pids+=("$!")
            bash toolchain/patches/gcc13/scripts/wrap-legacy-riscv-as.sh \
              "${as_target}" || true
          done

          # MPFR dist sources are materialized by tool/build stages; apply the
          # ptrdiff_t visibility fallback here (not in pre-tools workspace patching).
          mpfr_vasprintf="external/lgpl3/mpfr/dist/src/vasprintf.c"
          if [[ -f "${mpfr_vasprintf}" ]] && ! grep -q '<sys/types.h>' "${mpfr_vasprintf}"; then
            perl -0pi -e 's|#include <stddef.h>             /\* for ptrdiff_t \*/\n#endif|#include <stddef.h>             /* for ptrdiff_t */\n#endif\n\n/* Fallback for GCC13 spike headers where stddef visibility can be partial. */\n#include <sys/types.h>|' "${mpfr_vasprintf}"
          fi

          # GCC13 libstdc++ expects these internal bits headers while this
          # spike lane still composes include trees in a GCC4-era layout.
          # Seed the two required headers from libsupc++ before distribution.
          gxx_include_dir="${PWD}/${OBJDIR}/destdir.${MACHINE}/usr/include/g++"
          gxx_bits_dir="${PWD}/${OBJDIR}/destdir.${MACHINE}/usr/include/g++/bits"
          src_libstdcpp_include="external/gpl3/gcc/dist/libstdc++-v3/include"
          src_libstdcpp_libsupcxx="external/gpl3/gcc/dist/libstdc++-v3/libsupc++"
          mkdir -p "${gxx_bits_dir}"

          # Refresh the seeded libstdc++ headers with GCC13 sources. Copy-missing
          # is not enough here because obj.intrgcc seeds a GCC4-era usr/include/g++
          # tree whose stale headers (for example string/system_error/cstddef)
          # must be replaced for GCC13 compilation.
          if [[ -d "${src_libstdcpp_include}/std" ]]; then
            cp -af "${src_libstdcpp_include}/std/." "${gxx_include_dir}/"
          fi
          if [[ -d "${src_libstdcpp_include}/c_global" ]]; then
            cp -af "${src_libstdcpp_include}/c_global/." "${gxx_include_dir}/"
          fi
          if [[ -d "${src_libstdcpp_include}/bits" ]]; then
            mkdir -p "${gxx_include_dir}/bits"
            cp -af "${src_libstdcpp_include}/bits/." "${gxx_include_dir}/bits/"
          fi
          if [[ -d "${src_libstdcpp_include}/ext" ]]; then
            mkdir -p "${gxx_include_dir}/ext"
            cp -af "${src_libstdcpp_include}/ext/." "${gxx_include_dir}/ext/"
          fi
          if [[ -d "${src_libstdcpp_include}/backward" ]]; then
            mkdir -p "${gxx_include_dir}/backward"
            cp -af "${src_libstdcpp_include}/backward/." "${gxx_include_dir}/backward/"
          fi

          # GCC13 ships bits/exception.h as libsupc++/exception.h.
          # Older trees used libsupc++/exception for this role.
          if [[ ! -f "${gxx_bits_dir}/exception.h" ]]; then
            if [[ -f "${src_libstdcpp_libsupcxx}/exception.h" ]]; then
              cp -f "${src_libstdcpp_libsupcxx}/exception.h" \
                "${gxx_bits_dir}/exception.h"
            elif [[ -f "${src_libstdcpp_libsupcxx}/exception" ]]; then
              cp -f "${src_libstdcpp_libsupcxx}/exception" \
                "${gxx_bits_dir}/exception.h"
            fi
          fi
          if [[ -f "${src_libstdcpp_libsupcxx}/cxxabi_init_exception.h" ]] && \
             [[ ! -f "${gxx_bits_dir}/cxxabi_init_exception.h" ]]; then
            cp -f "${src_libstdcpp_libsupcxx}/cxxabi_init_exception.h" \
              "${gxx_bits_dir}/cxxabi_init_exception.h"
          fi

          # The legacy MINIX c++config.h used in this lane is GCC4-era and
          # misses macros required by GCC13 headers. Patch the arch source once
          # and then force-sync it to all include search locations.
          gxx_cxxconfig="${gxx_bits_dir}/c++config.h"
          gxx_legacy_bits_dir="${PWD}/${OBJDIR}/destdir.${MACHINE}/usr/include/gcc-4.8/bits"
          gxx_legacy_cxxconfig="${gxx_legacy_bits_dir}/c++config.h"
          arch_cxxconfig="external/gpl3/gcc/lib/libstdc++-v3/arch/riscv64/c++config.h"

          if [[ -f "${arch_cxxconfig}" ]] && \
             ! grep -q 'GCC13_SPIKE_CXXCONFIG_COMPAT' "${arch_cxxconfig}"; then
            cat >> "${arch_cxxconfig}" <<'EOF'
            /* GCC13_SPIKE_CXXCONFIG_COMPAT: fallback macros for legacy c++config.h. */
            #ifndef _GLIBCXX_DEPRECATED_SUGGEST
            # define _GLIBCXX_DEPRECATED_SUGGEST(ALT)
            #endif
            #ifndef _GLIBCXX11_DEPRECATED
            # define _GLIBCXX11_DEPRECATED
            #endif
            #ifndef _GLIBCXX11_DEPRECATED_SUGGEST
            # define _GLIBCXX11_DEPRECATED_SUGGEST(ALT)
            #endif
            #ifndef _GLIBCXX14_DEPRECATED
            # define _GLIBCXX14_DEPRECATED
            #endif
            #ifndef _GLIBCXX14_DEPRECATED_SUGGEST
            # define _GLIBCXX14_DEPRECATED_SUGGEST(ALT)
            #endif
            #ifndef _GLIBCXX17_DEPRECATED
            # define _GLIBCXX17_DEPRECATED
            #endif
            #ifndef _GLIBCXX17_DEPRECATED_SUGGEST
            # define _GLIBCXX17_DEPRECATED_SUGGEST(ALT)
            #endif
            #ifndef _GLIBCXX20_DEPRECATED
            # define _GLIBCXX20_DEPRECATED
            #endif
            #ifndef _GLIBCXX20_DEPRECATED_SUGGEST
            # define _GLIBCXX20_DEPRECATED_SUGGEST(ALT)
            #endif
            #ifndef _GLIBCXX23_DEPRECATED
            # define _GLIBCXX23_DEPRECATED
            #endif
            #ifndef _GLIBCXX23_DEPRECATED_SUGGEST
            # define _GLIBCXX23_DEPRECATED_SUGGEST(ALT)
            #endif
            #ifndef _GLIBCXX_USE_DUAL_ABI
            # define _GLIBCXX_USE_DUAL_ABI 1
            #endif
            #if ! _GLIBCXX_USE_DUAL_ABI
            # undef _GLIBCXX_USE_CXX11_ABI
            #endif
            #ifndef _GLIBCXX_USE_CXX11_ABI
            # define _GLIBCXX_USE_CXX11_ABI 1
            #endif
            #if _GLIBCXX_USE_CXX11_ABI
            namespace std {
              inline namespace __cxx11 _GLIBCXX_ABI_TAG_CXX11 { }
            }
            namespace __gnu_cxx {
              inline namespace __cxx11 _GLIBCXX_ABI_TAG_CXX11 { }
            }
            #ifndef _GLIBCXX_BEGIN_NAMESPACE_CXX11
            # define _GLIBCXX_BEGIN_NAMESPACE_CXX11 namespace __cxx11 {
            #endif
            #ifndef _GLIBCXX_END_NAMESPACE_CXX11
            # define _GLIBCXX_END_NAMESPACE_CXX11 }
            #endif
            #ifndef _GLIBCXX_NAMESPACE_CXX11
            # define _GLIBCXX_NAMESPACE_CXX11 __cxx11::
            #endif
            #ifndef _GLIBCXX_DEFAULT_ABI_TAG
            # define _GLIBCXX_DEFAULT_ABI_TAG _GLIBCXX_ABI_TAG_CXX11
            #endif
            #else
            #ifndef _GLIBCXX_BEGIN_NAMESPACE_CXX11
            # define _GLIBCXX_BEGIN_NAMESPACE_CXX11
            #endif
            #ifndef _GLIBCXX_END_NAMESPACE_CXX11
            # define _GLIBCXX_END_NAMESPACE_CXX11
            #endif
            #ifndef _GLIBCXX_NAMESPACE_CXX11
            # define _GLIBCXX_NAMESPACE_CXX11
            #endif
            #ifndef _GLIBCXX_DEFAULT_ABI_TAG
            # define _GLIBCXX_DEFAULT_ABI_TAG
            #endif
            #endif
            #ifndef _GLIBCXX_NOEXCEPT_PARM
            # define _GLIBCXX_NOEXCEPT_PARM
            #endif
            #ifndef _GLIBCXX_NOEXCEPT_QUAL
            # define _GLIBCXX_NOEXCEPT_QUAL
            #endif
            #ifndef _GLIBCXX_INLINE_VERSION
            # define _GLIBCXX_INLINE_VERSION 0
            #endif
            #ifndef _GLIBCXX_BEGIN_INLINE_ABI_NAMESPACE
            # if _GLIBCXX_INLINE_VERSION
            #  define _GLIBCXX_BEGIN_INLINE_ABI_NAMESPACE(X)
            # else
            #  define _GLIBCXX_BEGIN_INLINE_ABI_NAMESPACE(X) inline namespace X {
            # endif
            #endif
            #ifndef _GLIBCXX_END_INLINE_ABI_NAMESPACE
            # if _GLIBCXX_INLINE_VERSION
            #  define _GLIBCXX_END_INLINE_ABI_NAMESPACE(X)
            # else
            #  define _GLIBCXX_END_INLINE_ABI_NAMESPACE(X) }
            # endif
            #endif
            #ifndef _GLIBCXX_NAMESPACE_LDBL_OR_CXX11
            # define _GLIBCXX_NAMESPACE_LDBL_OR_CXX11 _GLIBCXX_NAMESPACE_CXX11
            #endif
            #ifndef _GLIBCXX_BEGIN_NAMESPACE_LDBL_OR_CXX11
            # define _GLIBCXX_BEGIN_NAMESPACE_LDBL_OR_CXX11 _GLIBCXX_BEGIN_NAMESPACE_CXX11
            #endif
            #ifndef _GLIBCXX_END_NAMESPACE_LDBL_OR_CXX11
            # define _GLIBCXX_END_NAMESPACE_LDBL_OR_CXX11 _GLIBCXX_END_NAMESPACE_CXX11
            #endif
            #ifndef _GLIBCXX_NODISCARD
            # define _GLIBCXX_NODISCARD
            #endif
            #ifndef _GLIBCXX_NODISCARD_CTOR
            # define _GLIBCXX_NODISCARD_CTOR
            #endif
            #ifndef _GLIBCXX_CONSTEXPR
            # if __cplusplus >= 201103L
            #  define _GLIBCXX_CONSTEXPR constexpr
            #  define _GLIBCXX_USE_CONSTEXPR constexpr
            # else
            #  define _GLIBCXX_CONSTEXPR
            #  define _GLIBCXX_USE_CONSTEXPR const
            # endif
            #endif
            #ifndef _GLIBCXX_USE_CONSTEXPR
            # if __cplusplus >= 201103L
            #  define _GLIBCXX_USE_CONSTEXPR constexpr
            # else
            #  define _GLIBCXX_USE_CONSTEXPR const
            # endif
            #endif
            #ifndef _GLIBCXX14_CONSTEXPR
            # if __cplusplus >= 201402L
            #  define _GLIBCXX14_CONSTEXPR constexpr
            # else
            #  define _GLIBCXX14_CONSTEXPR
            # endif
            #endif
            #ifndef _GLIBCXX17_CONSTEXPR
            # if __cplusplus >= 201703L
            #  define _GLIBCXX17_CONSTEXPR constexpr
            # else
            #  define _GLIBCXX17_CONSTEXPR
            # endif
            #endif
            #ifndef _GLIBCXX20_CONSTEXPR
            # if __cplusplus >= 202002L
            #  define _GLIBCXX20_CONSTEXPR constexpr
            # else
            #  define _GLIBCXX20_CONSTEXPR
            # endif
            #endif
            #ifndef _GLIBCXX23_CONSTEXPR
            # if __cplusplus >= 202100L
            #  define _GLIBCXX23_CONSTEXPR constexpr
            # else
            #  define _GLIBCXX23_CONSTEXPR
            # endif
            #endif
            #ifndef _GLIBCXX17_INLINE
            # if __cplusplus >= 201703L
            #  define _GLIBCXX17_INLINE inline
            # else
            #  define _GLIBCXX17_INLINE
            # endif
            #endif
            #ifndef _GLIBCXX_NOEXCEPT_IF
            # if __cplusplus >= 201103L
            #  define _GLIBCXX_NOEXCEPT_IF(...) noexcept(__VA_ARGS__)
            # else
            #  define _GLIBCXX_NOEXCEPT_IF(...)
            # endif
            #endif
            #ifndef _GLIBCXX_TXN_SAFE
            # define _GLIBCXX_TXN_SAFE
            #endif
            #ifndef _GLIBCXX_TXN_SAFE_DYN
            # define _GLIBCXX_TXN_SAFE_DYN
            #endif

            #ifndef _GLIBCXX_SPIKE_GLOBAL_SIZE_T
            #define _GLIBCXX_SPIKE_GLOBAL_SIZE_T 1
            typedef __SIZE_TYPE__ size_t;
            typedef __PTRDIFF_TYPE__ ptrdiff_t;
            #endif

            #ifndef _GLIBCXX_SPIKE_STD_TERMINATE_FALLBACK
            #define _GLIBCXX_SPIKE_STD_TERMINATE_FALLBACK 1
            namespace std {
            #pragma GCC visibility push(default)
              extern "C++" __attribute__ ((__noreturn__, __always_inline__))
              inline void
              __terminate() _GLIBCXX_USE_NOEXCEPT
              {
                void terminate() _GLIBCXX_USE_NOEXCEPT
                  __attribute__ ((__noreturn__,__cold__));
                terminate();
              }
            #pragma GCC visibility pop
            }
            #endif

            #ifndef _GLIBCXX_SPIKE_IS_CONSTANT_EVALUATED
            #define _GLIBCXX_SPIKE_IS_CONSTANT_EVALUATED 1
            namespace std {
              inline bool
              __is_constant_evaluated() _GLIBCXX_USE_NOEXCEPT
              {
            #if defined(__has_builtin)
            # if __has_builtin(__builtin_is_constant_evaluated)
            #  if __cplusplus >= 201103L
                return __builtin_is_constant_evaluated();
            #  endif
            # endif
            #endif
                return false;
              }
            }
            #endif
          EOF
          fi

          obj_libstdcpp_dir="${PWD}/${OBJDIR}/external/gpl3/gcc/lib/libstdc++-v3"
          obj_libstdcpp_bits_dir="${obj_libstdcpp_dir}/bits"
          obj_libstdcpp_arch_bits_dir="${obj_libstdcpp_bits_dir}/riscv64"
          obj_libstdcpp_cxxconfig="${obj_libstdcpp_bits_dir}/c++config.h"
          obj_libstdcpp_arch_cxxconfig="${obj_libstdcpp_arch_bits_dir}/c++config.h"
          dist_libstdcpp_bits_dir="${PWD}/external/gpl3/gcc/dist/libstdc++-v3/include/bits"
          dist_libstdcpp_cxxconfig_h="${dist_libstdcpp_bits_dir}/c++config.h"
          dist_libstdcpp_cxxconfig="${dist_libstdcpp_bits_dir}/c++config"

          if [[ -f "${arch_cxxconfig}" ]]; then
            mkdir -p "${gxx_bits_dir}" "${gxx_legacy_bits_dir}"
            cp -f "${arch_cxxconfig}" "${gxx_cxxconfig}"
            cp -f "${arch_cxxconfig}" "${gxx_legacy_cxxconfig}"

            # Distribution builds include libstdc++ headers from the OBJDIR
            # build tree via -I. Refresh those copies too, otherwise they can
            # retain pre-patch GCC4-era ABI macros across incremental stages.
            mkdir -p "${obj_libstdcpp_bits_dir}" "${obj_libstdcpp_arch_bits_dir}"
            cp -f "${arch_cxxconfig}" "${obj_libstdcpp_cxxconfig}"
            cp -f "${arch_cxxconfig}" "${obj_libstdcpp_arch_cxxconfig}"

            # GCC13 source headers are searched before -I. during libstdc++
            # compilation, so refresh the dist copy as well when it exists.
            mkdir -p "${dist_libstdcpp_bits_dir}"
            cp -f "${arch_cxxconfig}" "${dist_libstdcpp_cxxconfig_h}"
            if [[ -f "${dist_libstdcpp_cxxconfig}" ]]; then
              cp -f "${arch_cxxconfig}" "${dist_libstdcpp_cxxconfig}"
            fi
          fi

          for verify_cxxconfig in "${dist_libstdcpp_cxxconfig_h}" "${dist_libstdcpp_cxxconfig}" "${obj_libstdcpp_cxxconfig}" "${obj_libstdcpp_arch_cxxconfig}" "${gxx_cxxconfig}" "${gxx_legacy_cxxconfig}" "${arch_cxxconfig}"; do
            if [[ -f "${verify_cxxconfig}" ]]; then
              echo "cxxconfig-check: ${verify_cxxconfig}"
              grep -nE 'GCC13_SPIKE_CXXCONFIG_COMPAT|_GLIBCXX_USE_DUAL_ABI|_GLIBCXX_USE_CXX11_ABI|_GLIBCXX_BEGIN_NAMESPACE_CXX11|_GLIBCXX_NAMESPACE_CXX11|_GLIBCXX_DEFAULT_ABI_TAG|_GLIBCXX_BEGIN_INLINE_ABI_NAMESPACE|_GLIBCXX_TXN_SAFE_DYN|_GLIBCXX11_DEPRECATED|_GLIBCXX_NODISCARD|_GLIBCXX23_CONSTEXPR' \
                "${verify_cxxconfig}" | tail -n 40 || true
            fi
          done

          # GCC13 riscv driver specs can inject -lgloss for this spike target.
          # MINIX userland does not provide libgloss; seed an empty archive to
          # satisfy the driver and keep the build moving.
          triplet_libdir="${tooldir}/${triplet}/lib"
          mkdir -p "${triplet_libdir}"
          ar_bin="${tooldir}/bin/${triplet}-ar"
          if [[ ! -x "${ar_bin}" ]]; then
            echo "Missing archiver for ${triplet}: ${ar_bin}" >&2
            exit 1
          fi
          "${ar_bin}" crsD "${triplet_libdir}/libgloss.a"

          cleanup_as_watchers() {
            if [[ -n "${link_watch_pid}" ]]; then
              kill "${link_watch_pid}" >/dev/null 2>&1 || true
            fi
            for pid in "${as_watch_pids[@]:-}"; do
              kill "${pid}" >/dev/null 2>&1 || true
            done
          }
          trap cleanup_as_watchers EXIT

          if ! (MKPCI=no HOST_CFLAGS="-O -fcommon ${HARDENING_OFF}" HOST_CXXFLAGS="-O ${HARDENING_OFF}" HAVE_GOLD=no HAVE_LLVM=no MKLLVM=no \
            ./build.sh -U -u -j"$(nproc)" -m "${MACHINE}" -O "${OBJDIR}" \
              "${target_override_args[@]}" \
              -V AVAILABLE_COMPILER=gcc \
              -V ACTIVE_CC=gcc \
              -V ACTIVE_CPP=gcc \
              -V ACTIVE_CXX=gcc \
              -V ACTIVE_OBJC=gcc \
              -V RISCV_ARCH_FLAGS='-march=rv64imafd -mcmodel=medany' \
              -V NOGCCERROR=yes \
              -V MKGCC=yes \
              -V MKGCCCMDS=yes \
              -V MKCXX=yes \
              -V MKLIBSTDCXX=yes \
              -V GCC13_SPIKE=yes \
              -V MKPIC=no \
              -V MKPICLIB=no \
              -V MKPICINSTALL=no \
              -V MKLIBOBJC=no \
              -V MKLIBGOMP=no \
              -V MKATF=no \
              -V USE_PCI=no \
              -V CHECKFLIST_FLAGS='-m -e' \
              distribution) 2>&1 | tee /tmp/gcc13-spike-distribution.log; then
            echo "gcc13 spike distribution build failed. Inspect /tmp/gcc13-spike-distribution.log" >&2
            exit 1
          fi

      - name: Bootstrap compiler smoke (gcc13 spike)
        shell: bash
        run: |
          set -euo pipefail
          target_mode="${target_mode:-native}"
          build_scope="${build_scope:-full}"
          if [[ "${build_scope}" != "full" ]]; then
            echo "Skipping bootstrap smoke for build_scope=${build_scope}"
            exit 0
          fi

          {
            tooldir="$(find "${PWD}/${OBJDIR}" -maxdepth 1 -type d -name 'tooldir.*' -print -quit)"
            if [[ -z "${tooldir}" ]]; then
              echo "Missing tooldir under ${PWD}/${OBJDIR}" >&2
              exit 1
            fi
            destdir="${PWD}/${OBJDIR}/destdir.${MACHINE}"
            if [[ "${target_mode}" == "shim" ]]; then
              triplet="riscv64-unknown-elf"
            else
              triplet="riscv64-elf32-minix"
            fi

            cc="${tooldir}/bin/${triplet}-gcc"
            cxx="${tooldir}/bin/${triplet}-g++"
            readelf="${tooldir}/bin/${triplet}-readelf"
            for tool in "${cc}" "${cxx}" "${readelf}"; do
              if [[ ! -x "${tool}" ]]; then
                echo "Missing compiler smoke tool: ${tool}" >&2
                exit 1
              fi
            done

            smoke_dir="/tmp/gcc13-bootstrap-smoke"
            rm -rf "${smoke_dir}"
            mkdir -p "${smoke_dir}"

            cat > "${smoke_dir}/hello.c" <<'SRC'
            #include <stdio.h>
            int main(void) { puts("hello"); return 0; }
            SRC

            cat > "${smoke_dir}/hello.cpp" <<'SRC'
            #include <vector>
            int main() { std::vector<int> v; v.push_back(1); return v[0] - 1; }
            SRC

            "${cc}" --sysroot="${destdir}" -I"${destdir}/usr/include" -c "${smoke_dir}/hello.c" -o "${smoke_dir}/hello.c.o"
            "${cxx}" --sysroot="${destdir}" -I"${destdir}/usr/include" -I"${destdir}/usr/include/g++" -c "${smoke_dir}/hello.cpp" -o "${smoke_dir}/hello.cpp.o"
            "${readelf}" -h "${smoke_dir}/hello.c.o" > "${smoke_dir}/hello.readelf.txt"
            grep -E 'Machine:.*RISC-V' "${smoke_dir}/hello.readelf.txt" >/dev/null
          } 2>&1 | tee /tmp/gcc13-spike-bootstrap.log

      - name: Upload gcc13 spike log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: riscv64-gcc13-spike-log-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            /tmp/gcc13-spike-tools.log
            /tmp/gcc13-spike-distribution.log
            /tmp/gcc13-spike-bootstrap.log
