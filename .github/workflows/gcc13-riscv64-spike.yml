name: riscv64-gcc13-spike

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/gcc13-riscv64-spike.yml"
      - "toolchain/patches/gcc13/**"
      - "external/gpl3/gcc/lib/**"
  workflow_dispatch:
    inputs:
      gcc_version:
        description: "Upstream GCC version to overlay (example: 13.2.0)"
        required: false
        default: "13.2.0"
        type: string
      target_mode:
        description: "Target mode: native=minix triple, shim=unknown-elf override"
        required: false
        default: "native"
        type: choice
        options:
          - native
          - shim
      build_scope:
        description: "Build scope: tools only or full distribution + bootstrap smoke"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - tools

permissions:
  contents: read

concurrency:
  group: riscv64-gcc13-spike-${{ github.ref }}
  cancel-in-progress: false

jobs:
  spike:
    runs-on: ubuntu-24.04
    timeout-minutes: 480
    env:
      DEBIAN_FRONTEND: noninteractive
      OBJDIR: obj.gcc13
      MACHINE: evbriscv64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reclaim runner disk space
        shell: bash
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup"
          df -h

          sudo swapoff -a || true
          sudo rm -f /swapfile || true

          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL || true

          if command -v docker >/dev/null 2>&1; then
            sudo docker system prune -af || true
          fi

          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

          echo "Disk usage after cleanup"
          df -h

      - name: Install host dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bc \
            bison \
            build-essential \
            byacc \
            ca-certificates \
            curl \
            e2fsprogs \
            file \
            flex \
            gawk \
            gperf \
            libelf-dev \
            libncurses-dev \
            libssl-dev \
            m4 \
            make \
            pkg-config \
            python3 \
            python3-pip \
            rsync \
            texinfo

      - name: Overlay GCC dist with upstream GCC 13
        shell: bash
        run: |
          set -euo pipefail

          gcc_ver='${{ inputs.gcc_version }}'
          if [[ -z "${gcc_ver}" ]]; then
            gcc_ver="13.2.0"
          fi

          case "${gcc_ver}" in
            13.*) ;;
            *)
              echo "This spike workflow currently supports GCC 13.x only. got=${gcc_ver}" >&2
              exit 1
              ;;
          esac

          workdir="$(mktemp -d)"
          trap 'rm -rf "${workdir}"' EXIT

          src_urls=(
            "https://ftp.gnu.org/gnu/gcc/gcc-${gcc_ver}/gcc-${gcc_ver}.tar.xz"
            "https://ftpmirror.gnu.org/gcc/gcc-${gcc_ver}/gcc-${gcc_ver}.tar.xz"
            "https://mirrors.kernel.org/gnu/gcc/gcc-${gcc_ver}/gcc-${gcc_ver}.tar.xz"
          )
          fetched=0
          for src_url in "${src_urls[@]}"; do
            echo "Fetching ${src_url}"
            if curl -L --fail --retry 5 --retry-delay 3 --retry-all-errors \
              --connect-timeout 20 --max-time 900 \
              -o "${workdir}/gcc.tar.xz" "${src_url}"; then
              fetched=1
              break
            fi
            echo "Fetch failed from ${src_url}, trying next mirror..."
          done
          if [[ "${fetched}" != "1" ]]; then
            echo "Failed to download gcc-${gcc_ver}.tar.xz from all mirrors" >&2
            exit 1
          fi

          echo "Extracting gcc-${gcc_ver}"
          tar -C "${workdir}" -xf "${workdir}/gcc.tar.xz"
          if [[ ! -d "${workdir}/gcc-${gcc_ver}" ]]; then
            echo "Missing extracted source dir: ${workdir}/gcc-${gcc_ver}" >&2
            exit 1
          fi

          rm -rf external/gpl3/gcc/dist
          mv "${workdir}/gcc-${gcc_ver}" external/gpl3/gcc/dist

          patch_dir="toolchain/patches/gcc13/gcc-dist"
          shopt -s nullglob
          patches=("${patch_dir}"/*.patch)
          if (( ${#patches[@]} > 0 )); then
            for p in "${patches[@]}"; do
              echo "Applying ${p}"
              patch -d external/gpl3/gcc/dist -p1 < "${p}"
            done
          else
            echo "No GCC13 dist patch files found in ${patch_dir}."
          fi

          # Visibility check only: without MINIX target hooks in config.gcc,
          # configure will fail with unsupported target.
          if ! grep -Eq 'minix|.*-\*-minix' external/gpl3/gcc/dist/gcc/config.gcc; then
            echo "Warning: no MINIX target entry found in GCC13 config.gcc; build is expected to fail until patchset is added." >&2
          fi

      - name: Build tools (gcc13 spike)
        shell: bash
        run: |
          set -euo pipefail
          HARDENING_OFF="-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0 -fno-stack-protector"
          target_mode='${{ inputs.target_mode }}'
          build_scope='${{ inputs.build_scope }}'
          if [[ -z "${target_mode}" ]]; then
            target_mode="native"
          fi
          if [[ -z "${build_scope}" ]]; then
            build_scope="full"
          fi
          case "${target_mode}" in
            native|shim) ;;
            *)
              echo "unsupported target_mode=${target_mode}" >&2
              exit 1
              ;;
          esac
          case "${build_scope}" in
            full|tools) ;;
            *)
              echo "unsupported build_scope=${build_scope}" >&2
              exit 1
              ;;
          esac

          # Apply small workspace-scoped compatibility patches in lexical order.
          workspace_patch_dir="toolchain/patches/gcc13/workspace"
          bash toolchain/patches/gcc13/scripts/apply-workspace-patches.sh \
            "${workspace_patch_dir}" "${target_mode}"

          if ! grep -q -- '-std=gnu++11' tools/gcc/Makefile; then
            echo "Failed to switch tools/gcc/Makefile host C++ standard to gnu++11" >&2
            exit 1
          fi
          if [[ "${target_mode}" == "shim" ]]; then
            if ! grep -q '^MACHINE_GNU_PLATFORM=.*riscv64-unknown-elf' tools/gcc/Makefile; then
              echo "Failed to override MACHINE_GNU_PLATFORM in tools/gcc/Makefile (shim mode)" >&2
              exit 1
            fi
          else
            if grep -q '^MACHINE_GNU_PLATFORM=.*riscv64-unknown-elf' tools/gcc/Makefile; then
              echo "Unexpected shim MACHINE_GNU_PLATFORM override in native mode" >&2
              exit 1
            fi
          fi

          target_override_args=()
          linkwatch_pid=""
          if [[ "${target_mode}" == "shim" ]]; then
            # Shim mode still builds host tools under riscv64-elf32-minix
            # while gcc sub-build expects riscv64-unknown-elf tools.
            bash toolchain/patches/gcc13/scripts/spawn-compat-linkwatch.sh "${OBJDIR}" &
            linkwatch_pid=$!
            target_override_args+=( -V MACHINE_GNU_PLATFORM=riscv64-unknown-elf )
          fi
          grep -nE '^MACHINE_GNU_PLATFORM|gnu\\+\\+1[1-7]|--target=\\$\\{MACHINE_GNU_PLATFORM\\}' \
            tools/gcc/Makefile | head -n 20 || true

          # GCC13 fixincludes expects a sysroot include tree in OBJDIR destdir.
          bash toolchain/patches/gcc13/scripts/seed-sysroot-headers.sh \
            "${OBJDIR}" "${MACHINE}" "obj.intrgcc"

          if ! (MKPCI=no HOST_CFLAGS="-O -fcommon ${HARDENING_OFF}" HOST_CXXFLAGS="-O ${HARDENING_OFF}" HAVE_GOLD=no HAVE_LLVM=no MKLLVM=no \
            ./build.sh -U -m "${MACHINE}" -O "${OBJDIR}" \
              "${target_override_args[@]}" \
              -V AVAILABLE_COMPILER=gcc \
              -V ACTIVE_CC=gcc \
              -V ACTIVE_CPP=gcc \
              -V ACTIVE_CXX=gcc \
              -V ACTIVE_OBJC=gcc \
              -V MKGCC=yes \
              -V MKGCCCMDS=yes \
              -V MKCXX=yes \
              -V MKLIBSTDCXX=yes \
              tools) 2>&1 | tee /tmp/gcc13-spike-tools.log; then
            if [[ -n "${linkwatch_pid}" ]]; then
              wait "${linkwatch_pid}" || true
            fi
            echo "gcc13 spike build failed. Inspect /tmp/gcc13-spike-tools.log" >&2
            exit 1
          fi
          if [[ -n "${linkwatch_pid}" ]]; then
            wait "${linkwatch_pid}" || true
            bash toolchain/patches/gcc13/scripts/refresh-compat-links.sh "${OBJDIR}"
          fi

          echo "target_mode=${target_mode}" >>"${GITHUB_ENV}"
          echo "build_scope=${build_scope}" >>"${GITHUB_ENV}"

      - name: Build distribution (gcc13 spike)
        shell: bash
        run: |
          set -euo pipefail
          HARDENING_OFF="-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0 -fno-stack-protector"
          target_mode="${target_mode:-native}"
          build_scope="${build_scope:-full}"
          if [[ "${build_scope}" != "full" ]]; then
            echo "Skipping distribution build for build_scope=${build_scope}"
            exit 0
          fi

          target_override_args=()
          if [[ "${target_mode}" == "shim" ]]; then
            target_override_args+=( -V MACHINE_GNU_PLATFORM=riscv64-unknown-elf )
          fi

          tooldir="$(find "${PWD}/${OBJDIR}" -maxdepth 1 -type d -name 'tooldir.*' -print -quit)"
          if [[ -z "${tooldir}" ]]; then
            echo "Missing tooldir under ${PWD}/${OBJDIR}" >&2
            exit 1
          fi

          if [[ "${target_mode}" == "shim" ]]; then
            triplet="riscv64-unknown-elf"
          else
            triplet="riscv64-elf32-minix"
          fi

          bash toolchain/patches/gcc13/scripts/wrap-legacy-riscv-as.sh \
            "${tooldir}/bin/${triplet}-as"

          if ! (MKPCI=no HOST_CFLAGS="-O -fcommon ${HARDENING_OFF}" HOST_CXXFLAGS="-O ${HARDENING_OFF}" HAVE_GOLD=no HAVE_LLVM=no MKLLVM=no \
            ./build.sh -U -u -j"$(nproc)" -m "${MACHINE}" -O "${OBJDIR}" \
              "${target_override_args[@]}" \
              -V AVAILABLE_COMPILER=gcc \
              -V ACTIVE_CC=gcc \
              -V ACTIVE_CPP=gcc \
              -V ACTIVE_CXX=gcc \
              -V ACTIVE_OBJC=gcc \
              -V RISCV_ARCH_FLAGS='-march=rv64imafd -mcmodel=medany' \
              -V NOGCCERROR=yes \
              -V MKGCC=yes \
              -V MKGCCCMDS=yes \
              -V MKCXX=yes \
              -V MKLIBSTDCXX=yes \
              -V MKLIBOBJC=no \
              -V MKLIBGOMP=no \
              -V MKATF=no \
              -V USE_PCI=no \
              -V CHECKFLIST_FLAGS='-m -e' \
              distribution) 2>&1 | tee /tmp/gcc13-spike-distribution.log; then
            echo "gcc13 spike distribution build failed. Inspect /tmp/gcc13-spike-distribution.log" >&2
            exit 1
          fi

      - name: Bootstrap compiler smoke (gcc13 spike)
        shell: bash
        run: |
          set -euo pipefail
          target_mode="${target_mode:-native}"
          build_scope="${build_scope:-full}"
          if [[ "${build_scope}" != "full" ]]; then
            echo "Skipping bootstrap smoke for build_scope=${build_scope}"
            exit 0
          fi

          {
            tooldir="$(find "${PWD}/${OBJDIR}" -maxdepth 1 -type d -name 'tooldir.*' -print -quit)"
            if [[ -z "${tooldir}" ]]; then
              echo "Missing tooldir under ${PWD}/${OBJDIR}" >&2
              exit 1
            fi
            destdir="${PWD}/${OBJDIR}/destdir.${MACHINE}"
            if [[ "${target_mode}" == "shim" ]]; then
              triplet="riscv64-unknown-elf"
            else
              triplet="riscv64-elf32-minix"
            fi

            cc="${tooldir}/bin/${triplet}-gcc"
            cxx="${tooldir}/bin/${triplet}-g++"
            readelf="${tooldir}/bin/${triplet}-readelf"
            for tool in "${cc}" "${cxx}" "${readelf}"; do
              if [[ ! -x "${tool}" ]]; then
                echo "Missing compiler smoke tool: ${tool}" >&2
                exit 1
              fi
            done

            smoke_dir="/tmp/gcc13-bootstrap-smoke"
            rm -rf "${smoke_dir}"
            mkdir -p "${smoke_dir}"

            cat > "${smoke_dir}/hello.c" <<'SRC'
            #include <stdio.h>
            int main(void) { puts("hello"); return 0; }
            SRC

            cat > "${smoke_dir}/hello.cpp" <<'SRC'
            #include <vector>
            int main() { std::vector<int> v; v.push_back(1); return v[0] - 1; }
            SRC

            "${cc}" --sysroot="${destdir}" -I"${destdir}/usr/include" -c "${smoke_dir}/hello.c" -o "${smoke_dir}/hello.c.o"
            "${cxx}" --sysroot="${destdir}" -I"${destdir}/usr/include" -I"${destdir}/usr/include/g++" -c "${smoke_dir}/hello.cpp" -o "${smoke_dir}/hello.cpp.o"
            "${readelf}" -h "${smoke_dir}/hello.c.o" > "${smoke_dir}/hello.readelf.txt"
            grep -E 'Machine:.*RISC-V' "${smoke_dir}/hello.readelf.txt" >/dev/null
          } 2>&1 | tee /tmp/gcc13-spike-bootstrap.log

      - name: Upload gcc13 spike log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: riscv64-gcc13-spike-log-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            /tmp/gcc13-spike-tools.log
            /tmp/gcc13-spike-distribution.log
            /tmp/gcc13-spike-bootstrap.log
